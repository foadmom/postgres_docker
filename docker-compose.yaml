# cat naptan_stops.sql | docker exec -i postgres psql -h localhost -U postgres -f-
# docker exec -it 879f99294e22 /bin/bash
services:
  postgres:
    # image: postgis/postgis:latest
    image: postgis/postgis:18-3.6-alpine
    container_name: postgres
    # restart: always
    security_opt:
      - apparmor=unconfined
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      # for postgres docker the data is in /var/lib/postgresql/18/docker
      # for postgis image the data is in /var/lib/postgresql/data
      - /home/foadm/data/postgresql:/var/lib/postgresql
      
  
    

